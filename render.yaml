services:
  - type: web
    name: hirehub-backend
    env: java
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests || mvn clean package -DskipTests
    startCommand: java -jar target/hirehub-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_CORS_ALLOWED_ORIGINS
        value: http://localhost:3000,https://ravirajj0001.github.io
